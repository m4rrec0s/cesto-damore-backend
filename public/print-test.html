<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖨️ Teste de Impressão</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 800px;
      width: 100%;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 { font-size: 28px; margin-bottom: 10px; }
    .content { padding: 30px; }
    .section { margin-bottom: 30px; }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #667eea;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      background: #f8d7da;
      color: #721c24;
    }
    .status-badge.connected {
      background: #d4edda;
      color: #155724;
    }
    .button-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    .btn-secondary {
      background: #e9ecef;
      color: #333;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message-log {
      background: #f8f9fa;
      border-radius: 6px;
      padding: 15px;
      max-height: 300px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      border: 1px solid #dee2e6;
    }
    .log-entry {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 4px;
      border-left: 3px solid #667eea;
      background: white;
    }
    .log-entry.sent { border-left-color: #28a745; background: #f0f7f4; }
    .log-entry.received { border-left-color: #007bff; background: #f0f5fb; }
    .log-entry.connected { border-left-color: #17a2b8; background: #f0f8f9; }
    .log-entry.disconnected { border-left-color: #dc3545; background: #fbf2f2; }
    .log-time { font-size: 11px; color: #999; }
    .log-type { font-weight: bold; color: #667eea; }
    .log-entry.sent .log-type { color: #28a745; }
    .log-entry.received .log-type { color: #007bff; }
    .footer {
      background: #f8f9fa;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #dee2e6;
      font-size: 12px;
      color: #666;
    }
    input, textarea {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🖨️ Teste de Impressão</h1>
      <p>WebSocket - Go Lang</p>
    </div>

    <div class="content">
      <div class="section">
        <div class="section-title">
          📊 Status
          <span id="statusBadge" class="status-badge">Desconectado</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">⚙️ Controles</div>
        <div class="button-group">
          <button class="btn-primary" onclick="checkPrinter()">🔍 Verificar</button>
          <button class="btn-primary" onclick="printTest()">📄 Imprimir</button>
          <button class="btn-secondary" onclick="clearHistory()">🗑️ Limpar</button>
        </div>
      </div>

      <div class="section">
        <div class="section-title">🛠️ Comando Custom</div>
        <div class="input-group">
          <input type="text" id="cmdType" placeholder="Tipo" value="CUSTOM">
          <button class="btn-primary" onclick="sendCustom()" style="width: auto;">Enviar</button>
        </div>
        <textarea id="cmdPayload" placeholder="Payload JSON (opcional)" style="width: 100%; height: 60px;"></textarea>
      </div>

      <div class="section">
        <div class="section-title">📨 Histórico</div>
        <div class="message-log" id="messageLog">
          <div class="log-entry connected">
            <div class="log-time">Aguardando...</div>
            <div class="log-type">SISTEMA</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Certifique-se que o agente Go está conectado em ws://localhost:3333/ws/print-agent</p>
      <p style="margin-top: 8px; opacity: 0.7;">Última atualização: <span id="lastUpdate">-</span></p>
    </div>
  </div>

  <script>
    const BASE_URL = window.location.origin;
    let updateInterval;

    async function checkStatus() {
      try {
        const res = await fetch(`${BASE_URL}/api/print-test/status`);
        const data = await res.json();
        const badge = document.getElementById('statusBadge');
        
        if (data.isConnected) {
          badge.textContent = '✓ Conectado';
          badge.className = 'status-badge connected';
        } else {
          badge.textContent = '✗ Desconectado';
          badge.className = 'status-badge';
        }
        
        document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('pt-BR');
      } catch (error) {
        console.error('Erro:', error);
      }
    }

    async function refreshHistory() {
      try {
        const res = await fetch(`${BASE_URL}/api/print-test/history`);
        const data = await res.json();
        const log = document.getElementById('messageLog');
        log.innerHTML = '';
        
        data.messages.forEach(msg => {
          const entry = document.createElement('div');
          entry.className = `log-entry ${msg.type.toLowerCase()}`;
          const time = new Date(msg.timestamp).toLocaleTimeString('pt-BR');
          const msgStr = typeof msg.message === 'string' ? msg.message : JSON.stringify(msg.message);
          entry.innerHTML = `<div class="log-time">${time}</div><div class="log-type">${msg.type}</div><div>${msgStr}</div>`;
          log.appendChild(entry);
        });
        log.scrollTop = log.scrollHeight;
      } catch (error) {
        console.error('Erro:', error);
      }
    }

    async function sendCmd(type, payload = {}) {
      try {
        const res = await fetch(`${BASE_URL}/api/print-test/send-command`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type, payload })
        });
        const data = await res.json();
        if (!data.success) {
          alert('Erro: ' + data.error);
        }
        await Promise.all([checkStatus(), refreshHistory()]);
      } catch (error) {
        alert('Erro: ' + error.message);
      }
    }

    function checkPrinter() { sendCmd('CHECK_PRINTER'); }
    function printTest() { sendCmd('PRINT_TEST', { content: 'Teste' }); }
    
    async function sendCustom() {
      const type = document.getElementById('cmdType').value;
      const payloadStr = document.getElementById('cmdPayload').value;
      if (!type) { alert('Preencha o tipo'); return; }
      try {
        const payload = payloadStr ? JSON.parse(payloadStr) : {};
        await sendCmd(type, payload);
        document.getElementById('cmdPayload').value = '';
      } catch (e) {
        alert('Payload JSON inválido');
      }
    }

    async function clearHistory() {
      if (!confirm('Limpar histórico?')) return;
      try {
        await fetch(`${BASE_URL}/api/print-test/clear-history`, { method: 'POST' });
        document.getElementById('messageLog').innerHTML = '';
        await checkStatus();
      } catch (error) {
        alert('Erro: ' + error.message);
      }
    }

    window.addEventListener('load', () => {
      checkStatus();
      refreshHistory();
      updateInterval = setInterval(() => {
        checkStatus();
        refreshHistory();
      }, 2000);
    });

    window.addEventListener('beforeunload', () => clearInterval(updateInterval));
  </script>
</body>
</html>
